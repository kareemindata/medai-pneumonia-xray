<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="medai-pneumonia-xray banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect x="0" y="0" width="6" height="320" fill="url(#accent)"/>

  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
    <text x="60" y="74" fill="#94a3b8" font-size="14" letter-spacing="3">01 · MEDAI · CHEST IMAGING</text>
    <text x="60" y="148" fill="#f8fafc" font-size="56" font-weight="700">medai-pneumonia-xray</text>
    <text x="60" y="196" fill="#cbd5e1" font-size="22">Transfer-learning baseline for pneumonia detection in chest X-rays.</text>
    <text x="60" y="226" fill="#94a3b8" font-size="18">ResNet-18 · PyTorch · class-balanced sampling · sensitivity-first reporting</text>

    <g transform="translate(60,258)">
      <g>
        <rect x="0" y="0" rx="14" ry="14" width="120" height="32" fill="#10b981" opacity="0.18" stroke="#10b981"/>
        <text x="60" y="21" fill="#10b981" font-size="14" text-anchor="middle">PyTorch</text>
      </g>
      <g transform="translate(132,0)">
        <rect rx="14" ry="14" width="160" height="32" fill="#3b82f6" opacity="0.18" stroke="#3b82f6"/>
        <text x="80" y="21" fill="#3b82f6" font-size="14" text-anchor="middle">ResNet-18 · ImageNet</text>
      </g>
      <g transform="translate(304,0)">
        <rect rx="14" ry="14" width="180" height="32" fill="#8b5cf6" opacity="0.18" stroke="#8b5cf6"/>
        <text x="90" y="21" fill="#8b5cf6" font-size="14" text-anchor="middle">ROC-AUC · sens@spec90</text>
      </g>
    </g>
  </g>

  <g transform="translate(880,80)" stroke="#10b981" stroke-width="2" fill="none" opacity="0.45">
    <ellipse cx="120" cy="100" rx="92" ry="118"/>
    <path d="M120 4 C 60 60, 50 140, 120 196"/>
    <path d="M120 4 C 180 60, 190 140, 120 196"/>
    <circle cx="92" cy="92" r="6" fill="#ef4444" stroke="none"/>
    <circle cx="148" cy="118" r="9" fill="#ef4444" opacity="0.7" stroke="none"/>
    <circle cx="106" cy="148" r="4" fill="#ef4444" stroke="none"/>
  </g>
</svg>
